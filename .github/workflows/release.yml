name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  cli:
    name: cli (${{ matrix.target }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            goos: linux
            goarch: amd64
          - target: linux-386
            goos: linux
            goarch: "386"
          - target: linux-arm64
            goos: linux
            goarch: arm64
          - target: linux-armv6
            goos: linux
            goarch: arm
            goarm: "6"
          - target: linux-armv7
            goos: linux
            goarch: arm
            goarm: "7"
          - target: windows-amd64
            goos: windows
            goarch: amd64
          - target: windows-386
            goos: windows
            goarch: "386"
          - target: windows-arm64
            goos: windows
            goarch: arm64
          - target: windows-armv6
            goos: windows
            goarch: arm
            goarm: "6"
          - target: windows-armv7
            goos: windows
            goarch: arm
            goarm: "7"
          - target: darwin-amd64
            goos: darwin
            goarch: amd64
          - target: darwin-arm64
            goos: darwin
            goarch: arm64
          - target: android-amd64
            goos: android
            goarch: amd64
          - target: android-386
            goos: android
            goarch: "386"
          - target: android-arm64
            goos: android
            goarch: arm64
          - target: android-armv6
            goos: android
            goarch: arm
            goarm: "6"
          - target: android-armv7
            goos: android
            goarch: arm
            goarm: "7"
    env:
      CGO_ENABLED: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache: true

      - name: Build
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          set -euo pipefail
          mkdir -p "dist/${{ matrix.target }}"
          exe=""
          if [ "${GOOS}" = "windows" ]; then
            exe=".exe"
          fi
          for cmd in glua gluac gluals; do
            go build -trimpath -ldflags="-s -w" -o "dist/${{ matrix.target }}/${cmd}${exe}" "./cmd/${cmd}"
          done

      - name: Archive
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            zip -r "glua-${{ matrix.target }}.zip" "${{ matrix.target }}"
          else
            tar -czf "glua-${{ matrix.target }}.tar.gz" "${{ matrix.target }}"
          fi

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: glua-${{ matrix.target }}
          path: |
            dist/glua-${{ matrix.target }}.tar.gz
            dist/glua-${{ matrix.target }}.zip
          if-no-files-found: ignore

  vscode-extension:
    name: vscode extension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vscode/extensions/glua-lsp/package-lock.json

      - name: Package VS Code extension
        run: make package-vscode

      - name: Upload VS Code extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: glua-lsp-vscode
          path: dist/*.vsix

  jetbrains-extension:
    name: jetbrains extension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.0.0"

      - name: Package JetBrains extension
        run: make package-jetbrains

      - name: Upload JetBrains extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: glua-lsp-jetbrains
          path: dist/*.zip

  github-release:
    name: github release
    runs-on: ubuntu-latest
    needs:
      - cli
      - vscode-extension
      - jetbrains-extension
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
