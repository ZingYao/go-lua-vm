name: release

on:
  workflow_dispatch:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  cli:
    name: cli (${{ matrix.target }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: linux-amd64
            os: ubuntu-latest
            goos: linux
            goarch: amd64
          - target: linux-386
            os: ubuntu-latest
            goos: linux
            goarch: "386"
          - target: linux-arm64
            os: ubuntu-latest
            goos: linux
            goarch: arm64
          - target: linux-armv6
            os: ubuntu-latest
            goos: linux
            goarch: arm
            goarm: "6"
          - target: linux-armv7
            os: ubuntu-latest
            goos: linux
            goarch: arm
            goarm: "7"
          - target: windows-amd64
            os: ubuntu-latest
            goos: windows
            goarch: amd64
          - target: windows-386
            os: ubuntu-latest
            goos: windows
            goarch: "386"
          - target: windows-arm64
            os: ubuntu-latest
            goos: windows
            goarch: arm64
          - target: darwin-amd64
            os: macos-latest
            goos: darwin
            goarch: amd64
          - target: darwin-arm64
            os: macos-latest
            goos: darwin
            goarch: arm64
          - target: android-arm64
            os: ubuntu-latest
            goos: android
            goarch: arm64
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache: true

      - name: Setup mise tools
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Setup Android NDK
        id: setup-ndk
        if: matrix.goos == 'android'
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c

      - name: Export Android NDK
        if: matrix.goos == 'android'
        run: echo "ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}" >> "${GITHUB_ENV}"

      - name: Resolve native toolchain
        shell: bash
        run: |
          set -euo pipefail
          native_target="${{ matrix.goos }}/${{ matrix.goarch }}"
          if [[ -n "${{ matrix.goarm }}" ]]; then
            native_target="${native_target}/${{ matrix.goarm }}"
          fi
          export NATIVE_CROSS_TARGETS="${native_target}"
          ./scripts/bootstrap-native-toolchains.sh --install
          ./scripts/bootstrap-native-toolchains.sh
          ./scripts/bootstrap-native-toolchains.sh --emit-github-env >> "${GITHUB_ENV}"

      - name: Build full-feature CLI
        shell: bash
        env:
          GOOS: ${{ matrix.goos }}
          GOARCH: ${{ matrix.goarch }}
          GOARM: ${{ matrix.goarm }}
        run: |
          set -euo pipefail
          ./scripts/build-release-cli-native.sh "${{ matrix.target }}" "${GOOS}" "${GOARCH}" "${GOARM:-}"

      - name: Archive
        shell: bash
        run: |
          set -euo pipefail
          cd dist
          if [[ "${{ matrix.goos }}" == "windows" ]]; then
            zip -r "glua-${{ matrix.target }}.zip" "${{ matrix.target }}"
          else
            tar -czf "glua-${{ matrix.target }}.tar.gz" "${{ matrix.target }}"
          fi

      - name: Upload CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: glua-${{ matrix.target }}
          path: |
            dist/glua-${{ matrix.target }}.tar.gz
            dist/glua-${{ matrix.target }}.zip
          if-no-files-found: ignore

  native-cli:
    name: native cli (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
    env:
      CGO_ENABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache: true

      - name: Resolve native target
        id: target
        run: |
          set -euo pipefail
          echo "name=$(go env GOOS)-$(go env GOARCH)" >> "${GITHUB_OUTPUT}"

      - name: Native Real Module Acceptance
        run: ./scripts/test-native-real-modules.sh

      - name: Build native glua
        run: |
          set -euo pipefail
          target="${{ steps.target.outputs.name }}"
          mkdir -p "dist/native-${target}"
          go build -tags native_modules -trimpath -ldflags="-s -w" -o "dist/native-${target}/glua" ./cmd/glua

      - name: Archive native glua
        run: |
          set -euo pipefail
          target="${{ steps.target.outputs.name }}"
          cd dist
          tar -czf "glua-native-${target}.tar.gz" "native-${target}"

      - name: Upload native CLI artifact
        uses: actions/upload-artifact@v4
        with:
          name: glua-native-${{ steps.target.outputs.name }}
          path: dist/glua-native-${{ steps.target.outputs.name }}.tar.gz

  vscode-extension:
    name: vscode extension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: vscode/extensions/glua-lsp/package-lock.json

      - name: Package VS Code extension
        run: make package-vscode

      - name: Upload VS Code extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: glua-lsp-vscode
          path: dist/*.vsix

  jetbrains-extension:
    name: jetbrains extension
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: "9.0.0"

      - name: Package JetBrains extension
        shell: bash
        run: |
          set -euo pipefail
          for attempt in 1 2 3; do
            if make package-jetbrains; then
              exit 0
            fi
            if [ "${attempt}" = "3" ]; then
              exit 1
            fi
            rm -rf jetbrains/extensions/glua-lsp/.gradle jetbrains/extensions/glua-lsp/build
            sleep $((attempt * 10))
          done

      - name: Upload JetBrains extension artifact
        uses: actions/upload-artifact@v4
        with:
          name: glua-lsp-jetbrains
          path: dist/*.zip

  github-release:
    name: github release
    runs-on: ubuntu-latest
    needs:
      - cli
      - native-cli
      - vscode-extension
      - jetbrains-extension
    if: startsWith(github.ref, 'refs/tags/')
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Generate bilingual release notes
        run: ./scripts/generate-release-notes.sh release-notes.md

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets
          merge-multiple: true

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-assets/*
          body_path: release-notes.md
