name: ci

on:
  push:
    branches:
      - main
      - master
      - "quanquan/**"
  pull_request:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  go-gates:
    name: go gates (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
          - windows-latest
    env:
      CGO_ENABLED: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache: true

      - name: Check Go Version
        run: go version

      - name: Format Check
        run: |
          files="$(gofmt -l $(find . -path ./third_party -prune -o -name '*.go' -print))"
          if [ -n "${files}" ]; then
            echo "${files}"
            exit 1
          fi

      - name: Project Gates
        run: ./scripts/check-go-gates.sh
