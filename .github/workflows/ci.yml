name: ci

on:
  workflow_dispatch:
  schedule:
    - cron: "0 18 * * *"
  push:
    branches:
      - main
      - master
      - master-unified
      - "quanquan/**"
  pull_request:
    branches:
      - main
      - master
      - master-unified

permissions:
  contents: read

jobs:
  go-gates:
    name: go gates (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os:
          - macos-latest
          - ubuntu-latest
    env:
      CGO_ENABLED: "0"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache: true

      - name: Check Go Version
        run: go version

      - name: Format Check
        if: runner.os != 'Windows'
        run: |
          files="$(gofmt -l $(find . -path ./third_party -prune -o -name '*.go' -print))"
          if [ -n "${files}" ]; then
            echo "${files}"
            exit 1
          fi

      - name: Project Gates
        run: ./scripts/check-go-gates.sh

      - name: Lua Race Check
        if: runner.os == 'Linux'
        # Go race detector 在 Linux 上依赖 CGO；该例外仅启用测试工具链，核心代码仍禁止 import "C"。
        env:
          CGO_ENABLED: "1"
        run: go test -race ./lua

  native-cross-compile:
    name: native cross compile (${{ matrix.name }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: linux-windows-android
            os: ubuntu-latest
            targets: >-
              linux/amd64
              linux/386
              linux/arm64
              linux/arm/6
              linux/arm/7
              windows/amd64
              windows/386
              windows/arm64
              android/arm64
          - name: darwin
            os: macos-latest
            targets: >-
              darwin/amd64
              darwin/arm64
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache: true

      - name: Setup mise tools
        uses: jdx/mise-action@v2
        with:
          install: true
          cache: true

      - name: Setup Android NDK
        id: setup-ndk
        if: matrix.name == 'linux-windows-android'
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: r27c

      - name: Export Android NDK
        if: matrix.name == 'linux-windows-android'
        run: echo "ANDROID_NDK_HOME=${{ steps.setup-ndk.outputs.ndk-path }}" >> "${GITHUB_ENV}"

      - name: Native Toolchain Summary
        env:
          NATIVE_CROSS_TARGETS: ${{ matrix.targets }}
        run: |
          set -euo pipefail
          ./scripts/bootstrap-native-toolchains.sh --install || true
          eval "$(./scripts/bootstrap-native-toolchains.sh --emit-env)"
          ./scripts/bootstrap-native-toolchains.sh || true

      - name: Native Cross Compile
        env:
          NATIVE_CROSS_TARGETS: ${{ matrix.targets }}
          NATIVE_CROSS_REQUIRE_ALL: "1"
        run: |
          set -euo pipefail
          eval "$(./scripts/bootstrap-native-toolchains.sh --emit-env)"
          ./scripts/check-native-cross-compile.sh

  native-module-gates:
    name: native module gates (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    defaults:
      run:
        shell: bash
    strategy:
      fail-fast: false
      matrix:
        os:
          - ubuntu-latest
    env:
      CGO_ENABLED: "1"
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26.4"
          cache: true

      - name: Check Go Version
        run: go version

      - name: Native Go Tests
        run: go test ./...

      - name: Native CLI Build
        run: go build -trimpath -o "build/ci-native-glua" ./cmd/glua

      - name: Native Real Module Acceptance
        run: ./scripts/test-native-real-modules.sh
